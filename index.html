<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>/</title>
  <style>
    body { background:black; color:#00ff9f; font-family:monospace; padding:20px; }
    #terminal { white-space:pre-wrap; line-height:1.4; }
    .input-line { display:flex; }
    .prompt { margin-right:5px; }
    input { background:black; border:none; color:#00ff9f; font-family:monospace; outline:none; width:100%; }
  </style>
</head>
<body>
<div id="terminal"></div>
<div class="input-line">
  <span class="prompt" id="prompt">dad@system:~$</span>
  <input id="cmd" autofocus />
</div>

<script>
const terminal = document.getElementById("terminal");
const input = document.getElementById("cmd");
const promptEl = document.getElementById("prompt");

// ===== FILESYSTEM =====
const fs = {
  "~": {
    type: "dir",
    children: {
      "about.txt": { type: "file", content: "Ini arsip hidupmu. Dibuat oleh ayah." },
      "message.txt": { type: "file", content: "Nak, jangan takut gagal." },
      "memories": {
        type: "dir",
        children: {
          "first_word.txt": { type: "file", content: "Kata pertamamu: Ayah" },
          "first_step.txt": { type: "file", content: "Langkah pertamamu..." }
        }
      },
      "secret": {
        type: "dir",
        locked: true,
        password: "ayah",
        children: {
          "truth.txt": { type: "file", content: "Ayah bangga sama kamu." }
        }
      }
    }
  }
};

let cwd = ["~"];
let unlocked = {};
let history = [];
let historyIndex = -1;

let isRoot = false;

// ===== COMMANDS =====
const commands = ["help","ls","cd","cat","unlock","clear","pwd","whoami","sudo"];

// ===== UTILS =====
function getDir(path) {
  let cur = fs;
  for (let p of path) cur = cur[p].children;
  return cur;
}

function print(text="") {
  terminal.innerHTML += text + "\n";
  window.scrollTo(0, document.body.scrollHeight);
}

// 🔥 PROMPT MINIMAL
function updatePrompt() {
  promptEl.textContent = isRoot ? "#" : "$";
}

// ===== COMMANDS =====
function ls() {
  print(Object.keys(getDir(cwd)).join("  "));
}

function cd(target) {
  if (!target) return;

  if (target === "..") {
    if (cwd.length > 1) cwd.pop();
    return;
  }

  const dir = getDir(cwd);

  if (!dir[target]) return print("No such directory");
  if (dir[target].type !== "dir") return print("Not a directory");

  if (dir[target].locked && !unlocked[target] && !isRoot) {
    return print("Locked. unlock " + target);
  }

  cwd.push(target);
}

function cat(file) {
  const dir = getDir(cwd);

  if (!dir[file] || dir[file].type !== "file") {
    return print("File not found");
  }

  print(dir[file].content);
}

function unlock(name) {
  const dir = getDir(cwd);

  if (!dir[name] || !dir[name].locked) {
    return print("Nothing to unlock");
  }

  const pass = prompt("Password:");

  if (pass === dir[name].password) {
    unlocked[name] = true;
    print("Access granted");
  } else {
    print("Wrong password");
  }
}

function pwd() {
  print(cwd.join("/"));
}

function whoami() {
  print(isRoot ? "root" : "user");
}

function sudo(arg) {
  if (arg === "reveal-truth") {
    print("[ROOT ACCESS GRANTED]");
    print("Ayah selalu ada buat kamu.");
  } else {
    print("sudo: command not allowed");
  }
}

// 💀 BACKDOOR
function backdoor() {
  print("...bypassing auth");
  print("...spawning root shell");

  isRoot = true;
  updatePrompt();

  print("[+] root");
}

// ===== HANDLER =====
function handleCommand(inputCmd) {
  let [base, arg] = inputCmd.split(" ");

  if (base === "backdoor") return backdoor();

  if (!commands.includes(base)) {
    return print("Command not found");
  }

  switch(base) {
    case "help": print(commands.join(" ")); break;
    case "ls": ls(); break;
    case "cd": cd(arg); break;
    case "cat": cat(arg); break;
    case "unlock": unlock(arg); break;
    case "clear": terminal.innerHTML=""; break;
    case "pwd": pwd(); break;
    case "whoami": whoami(); break;
    case "sudo": sudo(arg); break;
  }
}

// ===== INPUT =====
input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    const cmd = input.value.trim();
    if (cmd === "") return;

    print(promptEl.textContent + " " + cmd);

    history.push(cmd);
    historyIndex = history.length;

    handleCommand(cmd);
    input.value = "";
  }

  if (e.key === "ArrowUp") {
    if (historyIndex > 0) historyIndex--;
    input.value = history[historyIndex] || "";
  }

  if (e.key === "ArrowDown") {
    if (historyIndex < history.length - 1) historyIndex++;
    else return input.value = "";
    input.value = history[historyIndex] || "";
  }

  if (e.key === "Tab") {
    e.preventDefault();
    const val = input.value;
    const match = commands.find(c => c.startsWith(val));
    if (match) input.value = match;
  }
});

// ===== INIT =====
print("Booting...");
print("Welcome, thoriq.");
print("Type 'help'");
updatePrompt();
</script></body>
</html>
